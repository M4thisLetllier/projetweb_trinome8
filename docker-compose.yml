services:
  # Notre serveur web (Apache + PHP + PDO)
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      # Apache s'attend à trouver les fichiers web dans /var/www/html
      - ./src:/var/www/html
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: motdepassesupersecret
      MYSQL_DATABASE: ma_base_de_dev
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: